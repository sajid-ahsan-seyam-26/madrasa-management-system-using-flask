{% extends "base.html" %}

{% block page_title %}Add Fee Record{% endblock %}

{% block content %}
<div class="card">
    <form method="POST">
        <div class="form-grid">
            <label>Student
                <select name="student_id" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.admission_no }} - {{ s.name }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>Month
                <input type="month" name="month" required>
            </label>

            <label>Amount
                <input type="number" step="0.01" name="amount" required>
            </label>

            <label>Paid Amount
                <input type="number" step="0.01" name="paid_amount" value="0">
            </label>

            <label>Due Date
                <input type="date" name="due_date">
            </label>
        </div>

        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{{ url_for('fees') }}">Back</a>
    </form>
</div>
{% endblock %}
