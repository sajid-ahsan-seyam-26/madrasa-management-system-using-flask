{% extends "base.html" %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <form method="POST">
        <div class="form-grid">
            <label>Teacher Name
                <input type="text" name="name" value="{{ teacher.name if teacher else '' }}" required>
            </label>

            <label>Phone
                <input type="text" name="phone" value="{{ teacher.phone if teacher else '' }}">
            </label>

            <label>Email
                <input type="email" name="email" value="{{ teacher.email if teacher else '' }}">
            </label>

            <label>Subject
                <input type="text" name="subject" value="{{ teacher.subject if teacher else '' }}">
            </label>

            <label>Join Date
                <input type="date" name="join_date" value="{{ teacher.join_date if teacher else '' }}">
            </label>
        </div>

        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{{ url_for('teachers') }}">Back</a>
    </form>
</div>
{% endblock %}
