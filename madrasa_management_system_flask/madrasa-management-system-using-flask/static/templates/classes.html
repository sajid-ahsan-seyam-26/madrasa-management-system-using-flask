{% extends "base.html" %}

{% block page_title %}Classes{% endblock %}

{% block content %}
<div class="card">
    <div class="actions">
        <a class="btn" href="{{ url_for('add_class') }}">Add Class</a>
    </div>

    <div class="table-wrap">
        <table>
            <tr>
                <th>Class Name</th>
                <th>Level</th>
                <th>Room</th>
                <th>Action</th>
            </tr>

            {% for c in classes %}
            <tr>
                <td>{{ c.name }}</td>
                <td>{{ c.level }}</td>
                <td>{{ c.room }}</td>
                <td>
                    <a class="btn small secondary" href="{{ url_for('edit_class', id=c.id) }}">Edit</a>
                    <form class="inline-form" method="POST" action="{{ url_for('delete_class', id=c.id) }}" onsubmit="return confirm('Delete this class?')">
                        <button class="btn small danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4">No class found.</td></tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
