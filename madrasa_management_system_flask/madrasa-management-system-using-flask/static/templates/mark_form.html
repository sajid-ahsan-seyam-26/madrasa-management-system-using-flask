{% extends "base.html" %}

{% block page_title %}Add Exam Mark{% endblock %}

{% block content %}
<div class="card">
    <form method="POST">
        <div class="form-grid">
            <label>Student
                <select name="student_id" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.admission_no }} - {{ s.name }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>Subject
                <input type="text" name="subject" placeholder="Quran, Arabic, Hadith, Fiqh..." required>
            </label>

            <label>Exam Name
                <input type="text" name="exam_name" placeholder="Monthly Test / Final Exam" required>
            </label>

            <label>Marks
                <input type="number" step="0.01" name="marks" required>
            </label>

            <label>Total Marks
                <input type="number" step="0.01" name="total_marks" required>
            </label>

            <label>Exam Date
                <input type="date" name="exam_date">
            </label>
        </div>

        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{{ url_for('marks') }}">Back</a>
    </form>
</div>
{% endblock %}
